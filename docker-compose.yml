        context: .
        target: worker # <--- NOTE THIS (Uses the same code, different binary)
      environment:
        - REDIS_DSN=redis://redis:6379
        - DB_DSN=postgresql://neondb_owner:npg_2Dj0yanOAcze@ep-mute-butterfly-a19gn7fh-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      depends_on:
        - redis
version: '3.8'
services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      target: api
    ports:
      - "8080:8080"
    environment:
      - REDIS_DSN=redis://redis:6379
    depends_on:
      - redis
      
  worker:

global
    log stdout format raw local0

defaults
    log global
    mode http
    timeout connect 5s
    timeout client 60s
    timeout server 60s
    option httplog

resolvers docker
    nameserver dns 127.0.0.11:53
    accepted_payload_size 8192
    hold valid 5s

frontend http_in
    bind *:8080
    default_backend api_back

backend api_back
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    server-template api 10 api:8080 check resolvers docker init-addr libc,none
